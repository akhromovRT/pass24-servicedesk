worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    # Telegram Bot API can stream sendDocument/sendVideo payloads up to 50 MB.
    # Keep body size in sync with Telegram's server-side limits so large
    # uploads from backend/telegram/services/notify.py go through untouched.
    client_max_body_size      60m;
    client_body_buffer_size   1m;

    proxy_http_version        1.1;
    proxy_request_buffering   off;
    proxy_buffering           off;
    proxy_read_timeout        120s;
    proxy_send_timeout        120s;

    # Hide the bot token from access logs: replace /bot<token>/... with /bot***/...
    map $request_uri $scrubbed_uri {
        "~^(/telegram)?/bot[0-9]+:[A-Za-z0-9_-]+(/.*)$"         "$1/bot***$2";
        "~^(/telegram)?/file/bot[0-9]+:[A-Za-z0-9_-]+(/.*)$"    "$1/file/bot***$2";
        default                                                  $request_uri;
    }
    log_format tg_proxy '$remote_addr - [$time_local] "$request_method $scrubbed_uri $server_protocol" '
                       '$status $body_bytes_sent rt=$request_time '
                       'urt=$upstream_response_time upstream=$upstream_addr';
    access_log /dev/stdout tg_proxy;
    error_log  /dev/stderr  warn;

    server {
        listen 8080 default_server;
        server_name _;

        # Public DNS resolver inside the server so nginx re-resolves
        # api.telegram.org on every request (Telegram rotates edges —
        # caching a single IP at startup would eventually stall).
        resolver                  1.1.1.1 8.8.8.8 ipv6=off valid=30s;
        resolver_timeout          5s;

        # Health probe for docker/compose/monitoring.
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # Reject anything outside /telegram/* quickly so the proxy does not
        # become an open web gateway for random scanners.
        location = / {
            return 404;
        }

        # Main proxy: backend sets TELEGRAM_API_BASE=http://<host>:8080/telegram
        # aiogram then issues /bot<token>/<method> and /file/bot<token>/<path>
        # against that base; strip the /telegram prefix and forward to the
        # upstream 1:1.
        #
        # Using a variable in proxy_pass forces per-request DNS resolution
        # through the resolver directive above — required because we cannot
        # pin to a single edge IP.
        location /telegram/ {
            set $tg_host          api.telegram.org;
            rewrite ^/telegram/(.*)$ /$1 break;

            proxy_pass            https://$tg_host;
            proxy_ssl_server_name on;
            proxy_ssl_name        api.telegram.org;
            proxy_set_header      Host api.telegram.org;
            proxy_set_header      X-Forwarded-For   $remote_addr;
            proxy_set_header      X-Forwarded-Host  $host;
            proxy_set_header      X-Forwarded-Proto $scheme;

            # Telegram returns JSON, no need to buffer — lets long-polling /
            # file downloads stream through without proxy memory spikes.
            proxy_buffering       off;
        }
    }
}
