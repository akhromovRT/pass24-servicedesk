name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image name lowercase
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.IMAGE }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: GH_TOKEN,IMAGE,GH_ACTOR
          script: |
            echo $GH_TOKEN | docker login ghcr.io -u $GH_ACTOR --password-stdin
            docker pull $IMAGE:latest
            docker compose -f /opt/sites/pass24-servicedesk/docker-compose.yml up -d --remove-orphans
            docker image prune -f
            sleep 5
            echo "=== Running one-time Bitrix24 sync ==="
            docker exec site-pass24-servicedesk python -c "
            import asyncio
            from backend.customers.bitrix24_sync import sync_companies, sync_contacts
            async def run():
                c = await sync_companies()
                u = await sync_contacts()
                print(f'Companies: {c}')
                print(f'Contacts: {u}')
            asyncio.run(run())
            " 2>&1 || true
            echo "=== Container logs (last 30 lines) ==="
            docker logs site-pass24-servicedesk --tail=30 2>&1 || true
