name: Diag — container logs

on:
  workflow_dispatch:
    inputs:
      tail:
        description: "How many log lines to dump"
        required: false
        default: "500"

jobs:
  logs:
    runs-on: ubuntu-latest
    env:
      TAIL: ${{ inputs.tail }}
    steps:
      - name: Dump container logs via SSH
        uses: appleboy/ssh-action@v1
        env:
          TAIL: ${{ inputs.tail }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: TAIL
          script: |
            # Validate: TAIL must be a positive integer (prevents shell injection)
            if ! [[ "$TAIL" =~ ^[0-9]+$ ]]; then
              echo "invalid tail value; using 500"
              TAIL=500
            fi
            echo "=== docker ps ==="
            docker ps --filter name=site-pass24-servicedesk --format "{{.Names}}: {{.Status}}"
            echo ""
            echo "=== docker logs --tail=$TAIL ==="
            docker logs site-pass24-servicedesk --tail="$TAIL" 2>&1 || true
            echo ""
            echo "=== errors/exceptions/traceback (last 1000 lines) ==="
            docker logs site-pass24-servicedesk --tail=1000 2>&1 | grep -iE "error|exception|traceback|500|failed" | tail -40 || true
