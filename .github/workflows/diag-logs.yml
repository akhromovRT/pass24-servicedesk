name: Diag — container logs

on:
  workflow_dispatch:
    inputs:
      tail:
        description: "How many log lines to dump"
        required: false
        default: "500"

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Dump container logs via SSH
        uses: appleboy/ssh-action@v1
        env:
          TAIL: ${{ inputs.tail }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: TAIL
          script: |
            if ! [[ "$TAIL" =~ ^[0-9]+$ ]]; then
              echo "invalid tail value; using 500"
              TAIL=500
            fi
            echo "=== docker ps ==="
            docker ps --filter name=site-pass24-servicedesk --format "{{.Names}}: {{.Status}}"
            echo ""
            echo "=== all /auth/ calls in last 2000 lines ==="
            docker logs site-pass24-servicedesk --tail=2000 2>&1 | grep -E "/auth/" | tail -40 || true
            echo ""
            echo "=== all 4xx/5xx responses in last 2000 lines ==="
            docker logs site-pass24-servicedesk --tail=2000 2>&1 | grep -E "HTTP/1.1\" [45][0-9]{2}" | tail -40 || true
            echo ""
            echo "=== errors/exceptions/traceback (last 2000 lines) ==="
            docker logs site-pass24-servicedesk --tail=2000 2>&1 | grep -iE "error|exception|traceback|failed|critical" | tail -30 || true
