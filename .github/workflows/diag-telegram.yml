name: Diag — telegram bot
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Dump telegram-related logs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set +e
            echo "=== последние 300 строк с telegram/ticket/attachment/download ==="
            docker logs site-pass24-servicedesk --tail=300 2>&1 | grep -iE "telegram|ticket|attachment|download|file_id|_download_tg|getFile|exceeds" | tail -60
            echo ""
            echo "=== все ERROR + WARNING за последние 500 строк ==="
            docker logs site-pass24-servicedesk --tail=500 2>&1 | grep -iE "WARNING|ERROR|exception|traceback" | tail -30
            echo ""
            echo "=== все webhook POST за последние 300 строк ==="
            docker logs site-pass24-servicedesk --tail=300 2>&1 | grep -E "POST /telegram/webhook" | tail -20
            echo ""
            echo "=== tg_update за последние 300 строк ==="
            docker logs site-pass24-servicedesk --tail=300 2>&1 | grep "tg_update" | tail -20
