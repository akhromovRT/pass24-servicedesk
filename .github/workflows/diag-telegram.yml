name: Diag — telegram bot
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Dump telegram-related logs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set +e
            echo "=== env в контейнере ==="
            docker exec site-pass24-servicedesk printenv | grep '^TELEGRAM' | sort
            echo ""
            echo "=== все упоминания telegram/webhook/bot в последних 1000 строках ==="
            docker logs site-pass24-servicedesk --tail=1000 2>&1 | grep -iE "telegram|webhook|aiogram|bot\b" | tail -30
            echo ""
            echo "=== ошибки при старте приложения ==="
            docker logs site-pass24-servicedesk --tail=500 2>&1 | grep -iE "traceback|error|exception" | tail -20
            echo ""
            echo "=== curl с контейнера на self-hosted ==="
            docker exec site-pass24-servicedesk sh -c 'curl -s --max-time 5 http://178.104.228.43/bot1:fake/getMe' 2>&1 | head -5
            echo ""
            echo "=== netstat из контейнера — что слушает 8000? ==="
            docker exec site-pass24-servicedesk sh -c 'ss -ltn 2>/dev/null || netstat -ltn 2>/dev/null' 2>&1 | head -5
