name: Ops — apply telegram self-hosted env

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Discover env location and apply
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set +e
            cd /opt/sites/pass24-servicedesk
            echo "=== PWD + listing ==="
            pwd
            ls -la
            echo ""
            echo "=== Поиск .env файлов в ./opt/sites/pass24-servicedesk ==="
            find . -maxdepth 3 -name ".env*" -type f 2>/dev/null
            echo ""
            echo "=== docker-compose.yml ==="
            cat docker-compose.yml
            echo ""
            echo "=== inspect site-pass24-servicedesk: env + mounts ==="
            docker inspect site-pass24-servicedesk --format '{{range .Config.Env}}{{println .}}{{end}}' 2>&1 | grep -E "^(TELEGRAM|DATABASE|SMTP|APP)" | head -20
            echo "---"
            echo "=== mounts ==="
            docker inspect site-pass24-servicedesk --format '{{range .Mounts}}{{.Source}} -> {{.Destination}} ({{.Type}}){{println}}{{end}}' 2>&1
