name: Ops — apply telegram self-hosted env

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Patch docker-compose.yml and restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /opt/sites/pass24-servicedesk
            cp docker-compose.yml docker-compose.yml.bak.$(date +%Y%m%d_%H%M%S)
            echo "=== до правки: секция environment (TELEGRAM*) ==="
            grep -E 'TELEGRAM' docker-compose.yml || true
            echo ""
            if grep -q 'TELEGRAM_API_BASE:' docker-compose.yml; then
              echo "TELEGRAM_API_BASE уже есть — пропускаю"
            else
              sed -i '/TELEGRAM_WEBHOOK_SECRET:/a\      TELEGRAM_API_BASE: http://178.104.228.43' docker-compose.yml
              echo "TELEGRAM_API_BASE добавлено"
            fi
            if grep -q 'TELEGRAM_FILE_API_BASE:' docker-compose.yml; then
              echo "TELEGRAM_FILE_API_BASE уже есть — пропускаю"
            else
              sed -i '/TELEGRAM_API_BASE: http/a\      TELEGRAM_FILE_API_BASE: http://178.104.228.43/tgfiles' docker-compose.yml
              echo "TELEGRAM_FILE_API_BASE добавлено"
            fi
            echo ""
            echo "=== после правки ==="
            grep -E 'TELEGRAM' docker-compose.yml
            echo ""
            echo "=== валидность yaml ==="
            python3 -c "import yaml; yaml.safe_load(open('docker-compose.yml')); print('YAML OK')" || { echo 'YAML BROKEN'; exit 1; }
            echo ""
            echo "=== рестарт только web ==="
            docker compose up -d --force-recreate --no-deps web
            sleep 6
            echo ""
            echo "=== статус ==="
            docker ps --filter name=site-pass24-servicedesk --format "{{.Names}}: {{.Status}}"
            echo ""
            echo "=== активные TELEGRAM env в контейнере ==="
            docker exec site-pass24-servicedesk printenv 2>/dev/null | grep '^TELEGRAM_' | sort
            echo ""
            echo "=== последние 15 строк app-логов ==="
            docker logs site-pass24-servicedesk --tail=15 2>&1 | grep -iE "started|listening|uvicorn|error" | tail -10
